apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: payguard
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            periodSeconds: 10
            failureThreshold: 6
