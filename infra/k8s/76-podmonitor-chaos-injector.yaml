apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: chaos-injector
  namespace: payguard
  labels:
    app: chaos-injector
spec:
  selector:
    matchLabels:
      app: chaos-injector
  podMetricsEndpoints:
    - port: management
      path: /actuator/prometheus
      interval: 15s
      relabelings:
        - targetLabel: job
          replacement: chaos-injector
