apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: payguard
  labels:
    app: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: payguard-worker:latest
          imagePullPolicy: Never
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: SPRING_DATASOURCE_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: REDIS_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payguard-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payguard-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
