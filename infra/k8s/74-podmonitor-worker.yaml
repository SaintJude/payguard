apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: worker
  namespace: payguard
  labels:
    app: worker
spec:
  selector:
    matchLabels:
      app: worker
  podMetricsEndpoints:
    - port: management
      path: /actuator/prometheus
      interval: 15s
      relabelings:
        - targetLabel: job
          replacement: worker
