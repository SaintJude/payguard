paymentApi:
  image:
    repository: payguard-payment-api
    tag: latest
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 50
    scaleDownStabilizationWindowSeconds: 60

worker:
  image:
    repository: payguard-worker
    tag: latest
  replicaCount: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    minReplicas: 2
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60
    scaleDownStabilizationWindowSeconds: 60

mockDownstream:
  image:
    repository: payguard-mock-downstream
    tag: latest
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

chaosInjector:
  image:
    repository: payguard-chaos-injector
    tag: latest
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

otelCollector:
  image:
    repository: otel/opentelemetry-collector
    tag: "0.111.0"
  replicaCount: 1
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 200m
      memory: 200Mi

postgres:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  persistence:
    size: 1Gi
  credentials:
    username: payguard
    password: payguard

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
