apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-api
  namespace: payguard
  labels:
    app: payment-api
spec:
  replicas: {{ .Values.paymentApi.replicaCount }}
  selector:
    matchLabels:
      app: payment-api
  template:
    metadata:
      labels:
        app: payment-api
    spec:
      containers:
        - name: payment-api
          image: "{{ .Values.paymentApi.image.repository }}:{{ .Values.paymentApi.image.tag }}"
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: SPRING_DATASOURCE_URL
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: REDIS_PORT
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: payguard-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: payguard-secrets
                  key: DB_PASSWORD
            - name: OTEL_SERVICE_NAME
              value: "payment-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: OTEL_EXPORTER_OTLP_PROTOCOL
            - name: OTEL_TRACES_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: OTEL_TRACES_EXPORTER
            - name: OTEL_METRICS_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: OTEL_METRICS_EXPORTER
            - name: OTEL_LOGS_EXPORTER
              valueFrom:
                configMapKeyRef:
                  name: payguard-config
                  key: OTEL_LOGS_EXPORTER
          resources:
            requests:
              cpu: {{ .Values.paymentApi.resources.requests.cpu }}
              memory: {{ .Values.paymentApi.resources.requests.memory }}
            limits:
              cpu: {{ .Values.paymentApi.resources.limits.cpu }}
              memory: {{ .Values.paymentApi.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
