apiVersion: v1
kind: ConfigMap
metadata:
  name: payguard-overview-dashboard
  namespace: payguard
  labels:
    grafana_dashboard: "1"
data:
  payguard-overview.json: |
    {
      "id": null,
      "uid": "payguard-overview",
      "title": "PayGuard Overview",
      "tags": [
        "payguard"
      ],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-30m",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          }
        ]
      },
      "panels": [
        {
          "id": 100,
          "type": "row",
          "title": "Resources",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "panels": []
        },
        {
          "id": 1,
          "type": "timeseries",
          "title": "CPU usage per pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"payguard\"}[1m])) by (pod)",
              "legendFormat": "{{ "{{pod}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Memory usage per pod",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "sum(container_memory_working_set_bytes{namespace=\"payguard\"}) by (pod)",
              "legendFormat": "{{ "{{pod}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "id": 101,
          "type": "row",
          "title": "Traffic",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 9
          },
          "panels": []
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "payment-api HTTP request rate by status code",
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 0,
            "y": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"payment-api\"}[1m])) by (status)",
              "legendFormat": "{{ "{{status}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "payment-api p95 latency",
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 6,
            "y": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{job=\"payment-api\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Payments processed rate by outcome",
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 12,
            "y": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "sum(rate(payments_processed_total[1m])) by (status)",
              "legendFormat": "{{ "{{status}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "id": 6,
          "type": "gauge",
          "title": "Payment failure rate %",
          "gridPos": {
            "h": 8,
            "w": 6,
            "x": 18,
            "y": 10
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "(sum(rate(payments_processed_total{status=\"FAILED\"}[1m])) / sum(rate(payments_processed_total[1m])))",
              "legendFormat": "failure rate"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 0.05
                  }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "id": 102,
          "type": "row",
          "title": "Chaos",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 18
          },
          "panels": []
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "chaos-injector request rate by outcome",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 19
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"chaos-injector\"}[1m])) by (status)",
              "legendFormat": "{{ "{{status}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "mock-downstream request rate",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 19
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"mock-downstream\"}[1m])) by (status)",
              "legendFormat": "{{ "{{status}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "id": 103,
          "type": "row",
          "title": "Scaling",
          "collapsed": false,
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 27
          },
          "panels": []
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "HPA current vs desired replicas",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 0,
            "y": 28
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"payguard\"}",
              "legendFormat": "{{ "{{horizontalpodautoscaler}} current" }}"
            },
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "kube_horizontalpodautoscaler_status_desired_replicas{namespace=\"payguard\"}",
              "legendFormat": "{{ "{{horizontalpodautoscaler}} desired" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Actual running replica count",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 8,
            "y": 28
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "kube_deployment_status_replicas{namespace=\"payguard\"}",
              "legendFormat": "{{ "{{deployment}}" }}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          }
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "payment-api CPU utilization % vs HPA target (50%)",
          "gridPos": {
            "h": 8,
            "w": 8,
            "x": 16,
            "y": 28
          },
          "datasource": {
            "type": "prometheus",
            "uid": "$datasource"
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "$datasource"
              },
              "expr": "avg(rate(container_cpu_usage_seconds_total{namespace=\"payguard\",pod=~\"payment-api.*\"}[1m])) / 0.1",
              "legendFormat": "CPU util % of request"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": {
                "thresholdsStyle": {
                  "mode": "line"
                }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "orange",
                    "value": 0.5
                  }
                ]
              }
            },
            "overrides": []
          }
        }
      ]
    }
