apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: payguard
  labels:
    app: otel-collector
spec:
  replicas: {{ .Values.otelCollector.replicaCount }}
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otelcol/config.yaml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
          resources:
            requests:
              cpu: {{ .Values.otelCollector.resources.requests.cpu }}
              memory: {{ .Values.otelCollector.resources.requests.memory }}
            limits:
              cpu: {{ .Values.otelCollector.resources.limits.cpu }}
              memory: {{ .Values.otelCollector.resources.limits.memory }}
          readinessProbe:
            tcpSocket:
              port: 4317
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 4317
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
