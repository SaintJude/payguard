apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payguard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SaintJude/payguard.git
    targetRevision: main
    path: infra/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: payguard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
