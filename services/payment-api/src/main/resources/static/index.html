<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PayGuard — Test Portal</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    max-width: 760px;
    margin: 2rem auto;
    padding: 0 1rem;
    line-height: 1.4;
  }
  h1 { font-size: 1.4rem; }
  h1 small { font-weight: normal; opacity: 0.6; font-size: 0.9rem; }
  form {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.5rem 0.75rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  label { font-size: 0.85rem; opacity: 0.75; }
  input { font: inherit; padding: 0.35rem 0.5rem; }
  button {
    font: inherit;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
  }
  #regen { grid-column: 3; justify-self: start; padding: 0.2rem 0.5rem; font-size: 0.8rem; }
  #submit-row { grid-column: 1 / -1; }
  table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
  th, td { text-align: left; padding: 0.4rem 0.5rem; border-bottom: 1px solid rgba(128,128,128,0.3); font-size: 0.9rem; }
  th { font-weight: 600; opacity: 0.7; }
  .status { font-weight: 600; padding: 0.1rem 0.5rem; border-radius: 3px; }
  .status-PENDING { background: rgba(200,160,0,0.2); }
  .status-COMPLETED { background: rgba(0,160,60,0.2); }
  .status-FAILED { background: rgba(200,0,0,0.2); }
  #error { color: #c00; font-size: 0.9rem; min-height: 1.2em; margin-bottom: 0.5rem; }
  code { font-size: 0.85em; opacity: 0.7; }
</style>
</head>
<body>

<h1>PayGuard <small>test portal — talks directly to payment-api on this origin</small></h1>

<form id="create-form">
  <label for="amount">Amount</label>
  <input id="amount" type="number" step="0.01" min="0.01" value="10.00" required>
  <span></span>

  <label for="key">Idempotency key</label>
  <input id="key" type="text" required>
  <button type="button" id="regen">new key</button>

  <div id="submit-row"><button type="submit">Submit payment</button></div>
</form>

<div id="error"></div>

<table>
  <thead>
    <tr><th>id</th><th>amount</th><th>idempotency key</th><th>status</th></tr>
  </thead>
  <tbody id="rows"></tbody>
</table>

<script>
  const rowsEl = document.getElementById('rows');
  const errorEl = document.getElementById('error');
  const keyInput = document.getElementById('key');
  const pollers = new Map();

  function newKey() {
    keyInput.value = crypto.randomUUID();
  }
  newKey();
  document.getElementById('regen').addEventListener('click', newKey);

  function upsertRow(payment) {
    let row = document.getElementById('row-' + payment.id);
    if (!row) {
      row = document.createElement('tr');
      row.id = 'row-' + payment.id;
      row.innerHTML = `<td><code>${payment.id}</code></td>
        <td>${payment.amount}</td>
        <td><code>${payment.idempotencyKey}</code></td>
        <td class="status-cell"></td>`;
      rowsEl.prepend(row);
    }
    const statusCell = row.querySelector('.status-cell');
    statusCell.innerHTML = `<span class="status status-${payment.status}">${payment.status}</span>`;
  }

  function pollUntilTerminal(id) {
    if (pollers.has(id)) return;
    const interval = setInterval(async () => {
      const res = await fetch(`/payments/${id}`);
      if (!res.ok) return;
      const payment = await res.json();
      upsertRow(payment);
      if (payment.status !== 'PENDING') {
        clearInterval(interval);
        pollers.delete(id);
      }
    }, 1000);
    pollers.set(id, interval);
  }

  document.getElementById('create-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    const amount = document.getElementById('amount').value;
    const idempotencyKey = keyInput.value;
    try {
      const res = await fetch('/payments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ amount, idempotencyKey })
      });
      if (!res.ok) {
        errorEl.textContent = `Request failed: ${res.status} ${await res.text()}`;
        return;
      }
      const payment = await res.json();
      upsertRow(payment);
      pollUntilTerminal(payment.id);
      newKey();
    } catch (err) {
      errorEl.textContent = 'Request failed: ' + err.message;
    }
  });
</script>

</body>
</html>
